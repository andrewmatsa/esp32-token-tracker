; PlatformIO Project Configuration File
; Token Tracker — ESP32-C3 Super Mini + ST7789 1.54" TFT

[env:esp32-c3-supermini]
; Pinned — newer espressif32 platform releases ship an Arduino-ESP32 core
; that crashes TFT_eSPI 2.5.43 on ESP32-C3 with a "Store access fault" panic
; inside tft.init() (Bodmer/TFT_eSPI#3464, #3636). 6.6.0 is the last
; confirmed-working release for this exact TFT_eSPI version.
platform = espressif32@6.6.0
board = esp32-c3-devkitm-1
framework = arduino
board_build.filesystem = spiffs
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    mathieucarbou/ESP Async WebServer @ ^3.0.6
    bblanchon/ArduinoJson @ ^7.3.1
build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=6
    -D TFT_SCLK=4
    -D TFT_CS=7
    -D TFT_DC=2
    -D TFT_RST=3
    -D TFT_BL=8
    -D TFT_BACKLIGHT_ON=1
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Verbose WiFi diagnostics (temporary) — Arduino strips esp_log_v/d calls
    ; below this level at compile time, so the underlying esp-idf WiFi
    ; driver's own log lines (association/auth failures, RF init issues)
    ; are otherwise invisible, not just Arduino's WiFi.h wrapper output.
    -D CORE_DEBUG_LEVEL=5
