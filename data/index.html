<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="layout">
  <div id="main-col">
    <header>
      <h1>Token Tracker</h1>
      <span id="ws-status" class="badge offline">Offline</span>
    </header>

    <main id="agent-list"></main>

    <button id="btn-add" onclick="openPresetModal()">+ Add Agent</button>

    <footer id="wifi-footer">
      <span id="wifi-info">WiFi: —</span>
      <button id="btn-wifi-reset" onclick="resetWifi()">Change WiFi</button>
    </footer>
  </div>

  <div id="display-col">
    <div id="display-wrap">
      <h3>ESP32 Display Preview</h3>
      <div id="esp-display">
        <div class="disp-idle"><div style="font-size:20px">📟</div><div>No active agent</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Preset picker modal ──────────────────────────────────────────────── -->
<div id="preset-modal" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <span>Choose a platform</span>
      <button class="modal-close" onclick="closePresetModal()">✕</button>
    </div>
    <div class="preset-grid" id="preset-grid"></div>
  </div>
</div>

<!-- ── Agent card template ─────────────────────────────────────────────── -->
<template id="tpl-card">
  <div class="card" data-index="" data-platform="" data-unit="tokens">
    <div class="card-header">
      <span class="platform-icon"></span>
      <div class="card-title">
        <span class="platform-name"></span>
        <span class="detected-model" hidden></span>
      </div>
      <div class="card-actions">
        <button class="btn-save">Save</button>
        <button class="btn-delete">Delete</button>
      </div>
      <label class="enabled-toggle">
        <input type="checkbox" class="inp-enabled" checked>
        <span>Enabled</span>
      </label>
    </div>

    <div class="apikey-row">
      <input class="inp-apikey" type="password" placeholder="API key (required — needed to fetch data)">
    </div>

    <div class="claude-config-row" hidden>
      <label><span class="model-label">Model</span>
        <select class="inp-model-select" hidden></select>
        <input class="inp-model" type="text" placeholder="Default / all models">
      </label>
      <label>Update every (sec)
        <input class="inp-interval" type="number" min="10" placeholder="100">
      </label>
    </div>

    <div class="daemon-cmd-row" hidden>
      <div class="daemon-cmd-line">
        <code class="daemon-cmd"></code>
        <button class="btn-copy-cmd" type="button">Copy</button>
      </div>
      <small class="daemon-cmd-hint">Restart this after reconnecting the device to WiFi or after a reboot.</small>
    </div>

  </div>
</template>

<script src="app.js"></script>
</body>
</html>
